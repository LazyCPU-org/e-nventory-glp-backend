x-app-common: &app-common
  build: .
  environment:
    DOCKER: "true"
    RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    RUN_SEED: ${RUN_SEED:-false}
  volumes:
    - .:/code
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - glp-network

services:
  app:
    <<: *app-common
    environment:
      APP_ENV: ${APP_ENV:-local}
      DOCKER: "true"
      APP_PORT: ":5000"
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-e-glp}
      DB_USER: ${POSTGRES_USER:-pguser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      RUN_SEED: ${RUN_SEED:-false}
    ports:
      - "5000:5000"

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-e-glp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - glp-network
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pguser} -d ${POSTGRES_DB:-e-glp}"]
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  glp-network:
    driver: bridge